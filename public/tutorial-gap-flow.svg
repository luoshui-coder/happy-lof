<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">溢价率计算与安全垫信息流程图</title>
  <desc id="desc">展示市价高于净值形成溢价，溢价要扣除费用和等待期波动才可能成为利润。</desc>
  <defs>
    <style>
      .bg{fill:#fff8ea}.card{fill:#fffdf5;stroke:#dfd5c1;stroke-width:3}.head{fill:#1d2424;font:700 38px "PingFang SC","Microsoft YaHei",sans-serif}.sub{fill:#6d746f;font:24px "PingFang SC","Microsoft YaHei",sans-serif}.title{fill:#672018;font:700 27px "PingFang SC","Microsoft YaHei",sans-serif}.body{fill:#1d2424;font:22px "PingFang SC","Microsoft YaHei",sans-serif}.small{fill:#6d746f;font:19px "PingFang SC","Microsoft YaHei",sans-serif}.red{fill:#9f2f25}.green{fill:#177b66}.gold{fill:#b98723}.arrow{stroke:#b98723;stroke-width:7;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#b98723"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text x="600" y="72" text-anchor="middle" class="head">溢价不是利润，它只是“安全垫”</text>
  <text x="600" y="112" text-anchor="middle" class="sub">先算价差，再扣费用，再考虑等待期波动</text>

  <rect x="70" y="170" width="290" height="260" rx="22" class="card"/>
  <text x="215" y="215" text-anchor="middle" class="title">净值 NAV</text>
  <rect x="125" y="260" width="180" height="105" rx="16" fill="#e4f1eb" stroke="#177b66" stroke-width="4"/>
  <text x="215" y="325" text-anchor="middle" class="body">基金真实水位</text>
  <text x="215" y="390" text-anchor="middle" class="small">底层资产估出来的价值</text>

  <rect x="455" y="170" width="290" height="260" rx="22" class="card"/>
  <text x="600" y="215" text-anchor="middle" class="title">市价 Price</text>
  <rect x="510" y="230" width="180" height="135" rx="16" fill="#fff0ec" stroke="#9f2f25" stroke-width="4"/>
  <text x="600" y="310" text-anchor="middle" class="body">市场交易水位</text>
  <text x="600" y="390" text-anchor="middle" class="small">买卖双方当下愿意成交的价</text>

  <rect x="840" y="170" width="290" height="260" rx="22" class="card"/>
  <text x="985" y="215" text-anchor="middle" class="title">溢价率</text>
  <text x="985" y="282" text-anchor="middle" class="body red">(市价 - 净值) / 净值</text>
  <text x="985" y="334" text-anchor="middle" class="small">右边水位高出左边多少</text>
  <text x="985" y="382" text-anchor="middle" class="small">数值越高，安全垫越厚</text>

  <path d="M365 300h80" class="arrow" marker-end="url(#arrow)"/>
  <path d="M750 300h80" class="arrow" marker-end="url(#arrow)"/>

  <rect x="130" y="500" width="940" height="116" rx="20" fill="#f7ebd5" stroke="#dfd5c1" stroke-width="3"/>
  <text x="600" y="540" text-anchor="middle" class="body">真正要问的问题</text>
  <text x="600" y="578" text-anchor="middle" class="small">溢价率 - 申购费 - 交易佣金 - 滑点 - 等待期波动，还剩多少？</text>
  <text x="600" y="610" text-anchor="middle" class="small red">剩下的才更接近“可落袋的价差”</text>
</svg>
