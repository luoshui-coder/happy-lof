          - generic [ref=e3115]: 绿灯越多越稳；只要有一盏红灯，就先别急着冲。
        - generic [ref=e3116]:
          - generic [ref=e3117]:
            - generic [ref=e3118]: 安全垫够不够
            - text: 普通 LOF 低溢价要谨慎；QDII 等待更久，通常需要更厚的安全垫。
          - generic [ref=e3119]:
            - generic [ref=e3120]: 成交额够不够
            - text: 成交太小，卖出时可能砸出很大滑点，就像窄门里大家一起挤。
          - generic [ref=e3121]:
